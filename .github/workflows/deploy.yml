name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-ec2:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_EC2_SSH_KEY }}" > ~/.ssh/careerbuddy.pem
          chmod 600 ~/.ssh/careerbuddy.pem
          ssh-keyscan -H "${{ secrets.AWS_EC2_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload project
        run: |
          tar --exclude=.git --exclude=node_modules --exclude=.venv -czf /tmp/careerbuddy.tar.gz .
          ssh -i ~/.ssh/careerbuddy.pem "${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }}" "sudo mkdir -p /opt/careerbuddy && sudo chown ${{ secrets.AWS_EC2_USER }} /opt/careerbuddy"
          scp -i ~/.ssh/careerbuddy.pem /tmp/careerbuddy.tar.gz "${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }}:/tmp/careerbuddy.tar.gz"
      - name: Restart stack
        run: |
          ssh -i ~/.ssh/careerbuddy.pem "${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }}" <<'REMOTE'
          set -euo pipefail
          cd /opt/careerbuddy
          tar -xzf /tmp/careerbuddy.tar.gz -C /opt/careerbuddy
          if [ ! -f .env ]; then
            echo "Missing /opt/careerbuddy/.env. Create it on the EC2 instance before deploying." >&2
            exit 1
          fi
          docker compose up -d --build
          docker compose exec -T backend alembic upgrade head
          REMOTE