name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: careerbuddy
          POSTGRES_USER: careerbuddy
          POSTGRES_PASSWORD: careerbuddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careerbuddy -d careerbuddy"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: test-secret
      DATABASE_URL: postgresql+asyncpg://careerbuddy:careerbuddy@localhost:5432/careerbuddy
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint backend
        run: ruff check app tests
      - name: Apply database migrations
        run: alembic upgrade head
      - name: Test backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
